version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: varamy-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-vara_my}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - varamy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: varamy-app
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-vara_my}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForJWTTokenGenerationMustBeAtLeast32CharactersLong}
      SERVER_PORT: 8081
      UPLOAD_DIR: /app/uploads
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8081}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/var/log/varamy
      - app_uploads:/app/uploads
    networks:
      - varamy-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  app_logs:
  app_uploads:

networks:
  varamy-network:
    driver: bridge